<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Skills-Lab hero graphic</title>
  <desc id="desc">Skills-Lab turns non-developer product ideas into source-grounded SDLC artifacts and small CLI-ready coding tasks.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#0A1226"/>
      <stop offset="1" stop-color="#130B2D"/>
    </linearGradient>
    <linearGradient id="accent" x1="80" y1="80" x2="1500" y2="780" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2F80ED"/>
      <stop offset="0.45" stop-color="#29D3C2"/>
      <stop offset="1" stop-color="#B14CFF"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#101B32" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#0A1020" stop-opacity="0.75"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1350" cy="145" r="220" fill="#2F80ED" opacity="0.12"/>
  <circle cx="280" cy="760" r="260" fill="#B14CFF" opacity="0.12"/>
  <path d="M82 724C302 617 454 650 628 725C828 812 1007 818 1514 604" stroke="url(#accent)" stroke-opacity="0.24" stroke-width="3"/>

  <g transform="translate(86 74)">
    <g filter="url(#glow)">
      <path d="M86 24v120L26 255c-12 23 5 51 31 51h190c26 0 43-28 31-51l-60-111V24" stroke="url(#accent)" stroke-width="10" stroke-linejoin="round"/>
      <path d="M120 152l-34 34 34 34M185 152l34 34-34 34M169 145l-33 84" stroke="#8CEBFF" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="112" cy="0" r="13" fill="#2F80ED"/>
      <circle cx="149" cy="-26" r="10" fill="#29D3C2"/>
      <circle cx="184" cy="5" r="12" fill="#B14CFF"/>
    </g>
    <text x="330" y="90" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="94" font-weight="800" letter-spacing="-3">Skills-Lab</text>
    <text x="335" y="143" fill="#5FD9FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700" letter-spacing="1">DESK SUITES FOR NON-DEVS, VIBE CODERS, AND AI-NATIVE BUILDERS</text>
    <text x="335" y="206" fill="#DCE8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">Walk through the SDLC with zero prior knowledge.</text>
    <text x="335" y="248" fill="#DCE8FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30">Produce source-grounded plans, code, tests, and shippable artifacts.</text>
  </g>

  <g transform="translate(86 402)">
    <rect x="0" y="0" width="1428" height="150" rx="24" fill="url(#panel)" stroke="#254363"/>
    <g transform="translate(44 32)">
      <text x="0" y="0" fill="#5FD9FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">CHAT INTERFACE</text>
      <text x="0" y="42" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Skills-Lab Desk Suites</text>
      <text x="0" y="80" fill="#BFD0EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">requirements • discovery • architecture • issues • tests • verification • release</text>
    </g>
    <path d="M620 76h196" stroke="#35A7FF" stroke-width="7" stroke-linecap="round"/>
    <path d="M792 48l38 28-38 28" stroke="#35A7FF" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="650" y="48" fill="#5FD9FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="22" font-weight="800">SMALL TASKS + FILES</text>
    <g transform="translate(870 32)">
      <text x="0" y="0" fill="#C78BFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="800">CLI EXECUTION</text>
      <text x="0" y="42" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="30" font-weight="700">Codex / Claude Code</text>
      <text x="0" y="80" fill="#BFD0EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24">minimal reasoning • focused fixes • validation loops</text>
    </g>
  </g>

  <g transform="translate(86 596)">
    <rect x="0" y="0" width="330" height="154" rx="22" fill="url(#panel)" stroke="#254363"/>
    <text x="30" y="48" fill="#5FD9FF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">ZERO KNOWLEDGE</text>
    <text x="30" y="90" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">Guided SDLC flow</text>
    <text x="30" y="123" fill="#BFD0EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">without being a developer</text>

    <rect x="366" y="0" width="330" height="154" rx="22" fill="url(#panel)" stroke="#254363"/>
    <text x="396" y="48" fill="#65FF8A" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">SHIP QUALITY</text>
    <text x="396" y="90" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">Plans, code, tests, docs</text>
    <text x="396" y="123" fill="#BFD0EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">with quality gates built in</text>

    <rect x="732" y="0" width="330" height="154" rx="22" fill="url(#panel)" stroke="#254363"/>
    <text x="762" y="48" fill="#FFCF5F" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">SAVE TOKENS</text>
    <text x="762" y="90" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">Reason in chat first</text>
    <text x="762" y="123" fill="#BFD0EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">hand off constrained tasks</text>

    <rect x="1098" y="0" width="330" height="154" rx="22" fill="url(#panel)" stroke="#254363"/>
    <text x="1128" y="48" fill="#C78BFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="26" font-weight="800">DESK SUITES</text>
    <text x="1128" y="90" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23">SDLC Command Desk</text>
    <text x="1128" y="123" fill="#BFD0EA" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21">and more suites to come</text>
  </g>

  <text x="800" y="824" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32" font-weight="700">Skills-Lab is the bridge between your idea and production.</text>
  <text x="800" y="865" text-anchor="middle" fill="#8CEBFF" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Chat does the thinking. CLI does the execution.</text>
</svg>
