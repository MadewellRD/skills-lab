interface:
  display_name: Implementation Handoff Desk
  short_description: Creates connector-grounded implementation handoffs for coding agents.
  default_prompt: Use $implementation-handoff-desk to route through connected GitHub, issue/project, docs, and communication sources when available, then create a downloadable markdown implementation handoff or connector diagnostic. Prefer concrete file paths, code anchors, validation commands, and low-token execution plans over broad coding-agent invention.
  icon: 🧭
  primary_color: '#1f6feb'
  icon_small: assets/icon.svg
  icon_large: assets/icon.svg
policy:
  products:
  - chatgpt
  - codex
  - api
  - atlas
  allow_implicit_invocation: true
